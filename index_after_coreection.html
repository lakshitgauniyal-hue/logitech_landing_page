<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logitech Entry</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Same fonts as landing page -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Same CSS as landing page (cursor styles are inside) -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .entry-box {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 3rem 4rem;
      background: #111111;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
      position: relative;
      z-index: 1;
    }

    .entry-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 4px;
      color: #f0f0eb;
      margin-bottom: 0.5rem;
    }

    .entry-sub {
      font-family: 'DM Sans', sans-serif;
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>

<body>

  <!-- ══ SAME CUSTOM CURSOR AS LANDING PAGE ══ -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- ENTRY BOX -->
  <div class="entry-box">
    <h1 class="entry-title">LOGITECH</h1>

    <p class="entry-sub">
      Precision. Performance. Power.<br>
      Explore next-gen devices built for creators &amp; gamers.
    </p>

    <!-- BUTTON TO LANDING PAGE -->
    <a href="landing.html" class="btn-logi-primary">
      Enter Experience →
    </a>
  </div>

  <script>
    /* ══════════════════════════════════════════════════
       EXACT SAME CURSOR AS LANDING PAGE
       - dot: 16px, instant follow, mix-blend-mode: difference
       - ring: lerp 0.18 (tight follow, less lag)
       - hover expand on interactive elements
    ══════════════════════════════════════════════════ */
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;

    /* Dot follows mouse instantly */
    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';
    });

    /* Ring follows with lerp 0.18 — same as landing page */
    (function loop() {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(loop);
    })();

    /* Hover expand on all interactive elements */
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring.classList.add('expanded');
        dot.classList.add('expanded');
      });
      el.addEventListener('mouseleave', () => {
        ring.classList.remove('expanded');
        dot.classList.remove('expanded');
      });
    });
  </script>

</body>
</html>
